name: Build luci-app-quickstart RunFiles Multi-Arch

on:
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号（格式如0.9.7-1），留空则自动下载最新'
        required: false
        default: ''
      download_base_url:
        description: 'ipk 文件下载基础 URL，目录下需有 x86_64 和 aarch64 文件夹'
        required: true
        default: 'https://example.com/luci-app-quickstart'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl makeself

      - name: 创建构建目录
        run: mkdir -p build/${{ matrix.arch }}

      - name: 下载 ipk 文件 ${{ matrix.arch }}
        id: download
        run: |
          VERSION_INPUT="${{ github.event.inputs.version }}"
          BASE_URL="${{ github.event.inputs.download_base_url }}"
          ARCH="${{ matrix.arch }}"

          if [ -z "$VERSION_INPUT" ]; then
            echo "未指定版本，尝试自动获取 latest.txt"
            VERSION=$(curl -fsSL "${BASE_URL}/${ARCH}/latest.txt" || echo "0.9.7-1")
          else
            VERSION="$VERSION_INPUT"
          fi

          echo "版本号: $VERSION"
          IPK_URL="${BASE_URL}/${ARCH}/luci-app-quickstart_${VERSION}_${ARCH}.ipk"
          echo "下载地址: $IPK_URL"

          curl -fLo build/${ARCH}/luci-app-quickstart_${VERSION}_${ARCH}.ipk "$IPK_URL"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 创建安装脚本 ${{ matrix.arch }}
        run: |
          cat > build/${{ matrix.arch }}/install.sh << 'EOF'
#!/bin/sh
echo "更新软件源..."
opkg update || exit 1
echo "安装 luci-app-quickstart ipk..."
opkg install luci-app-quickstart_*.ipk || exit 1
echo "安装完成"
EOF
          chmod +x build/${{ matrix.arch }}/install.sh

      - name: 制作 .run 安装包 ${{ matrix.arch }}
        run: |
          git clone https://github.com/megastep/makeself.git
          mv build/${{ matrix.arch }} makeself/
          cd makeself
          ./makeself.sh ${{ matrix.arch }} luci-app-quickstart-${{ steps.download.outputs.version }}-${{ matrix.arch }}.run "luci-app-quickstart Installer" ./install.sh
          cd ..

      - name: 上传 Release 文件 ${{ matrix.arch }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: quickstart-${{ steps.download.outputs.version }}
          name: luci-app-quickstart-${{ steps.download.outputs.version }}
          files: makeself/luci-app-quickstart-${{ steps.download.outputs.version }}-${{ matrix.arch }}.run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
