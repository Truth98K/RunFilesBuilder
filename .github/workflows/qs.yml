name: Make luci-app-quickstart RunFile

on:
  workflow_dispatch:

jobs:
  make-runfile:
    runs-on: ubuntu-latest
    name: Build luci-app-quickstart .run file

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up dependencies
        run: |
          sudo apt update
          sudo apt install -y upx-ucl p7zip-full

      - name: Download luci-app-quickstart IPK
        run: |
          mkdir -p ipk
          wget https://downloads.openwrt.org/releases/22.03.5/packages/x86_64/luci/luci-app-quickstart_0.9.7-1_all.ipk -O ipk/luci-app-quickstart.ipk

      - name: Clone RunFilesBuilder
        run: |
          git clone https://github.com/wukongdaily/RunFilesBuilder.git runbuilder
          cp -f ipk/luci-app-quickstart.ipk runbuilder/ipks/

      - name: Build .run file
        run: |
          cd runbuilder
          bash build.sh

      - name: Get latest build filename
        id: get_runfile
        run: |
          RUNFILE=$(find runbuilder/run/x86 -name "luci-app-quickstart_*.run" | head -n1)
          echo "runfile_path=${RUNFILE}" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload .run file
        uses: softprops/action-gh-release@v2
        with:
          name: luci-app-quickstart
          tag_name: luci-app-quickstart
          files: ${{ steps.get_runfile.outputs.runfile_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
