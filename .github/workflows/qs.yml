name: Make luci-app-quickstart RunFile

on:
  workflow_dispatch:

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 Install makeself and curl
        run: sudo apt-get update && sudo apt-get install -y makeself curl

      - name: 🚀 Download luci-app-quickstart ipk packages
        run: |
          mkdir -p store
          chmod +x shell/quickstart.sh
          ./shell/quickstart.sh

      - name: 📋 Copy install.sh to store folder
        run: |
          cp shell/install.sh store/install.sh
          chmod +x store/install.sh

      - name: 🔍 Extract version and package to .run
        id: pack
        run: |
          mkdir -p output
          QUICKSTART_IPK=$(ls store/luci-app-quickstart_*.ipk | head -n 1)
          VERSION=$(basename "$QUICKSTART_IPK" | sed -n 's/^luci-app-quickstart_\([^-]*-[^_]*\)_.*$/\1/p')
          if [ -z "$VERSION" ]; then
            echo "❌ Failed to extract version!"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          makeself store "output/luci-app-quickstart-${VERSION}_all.run" \
            "luci-app-quickstart Installer v${VERSION}" ./install.sh

      - name: 📤 Upload .run file to Release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: "luci-app-quickstart-${{ steps.pack.outputs.version }}"
          name: "luci-app-quickstart-${{ steps.pack.outputs.version }}"
          body_path: ${{ github.workspace }}/info/store.md
          files: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
